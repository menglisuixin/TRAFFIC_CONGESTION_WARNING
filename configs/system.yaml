project:
  name: traffic_congestion_warning
  root: .

video:
  source: data/videos/demo.mp4
  output: outputs/videos/result.mp4
  show: false

model:
  weights: yolov5s.pt
  device: cuda
  img_size: 640
  conf_thres: 0.25
  iou_thres: 0.45
  # For official COCO weights, auto_classes keeps only car=2 and truck=7.
  # For custom traffic weights, auto_classes keeps only Motor Vehicle.
  auto_classes: true
  classes:
    - 2
    - 7

tracker:
  # deepsort: use deep_sort_realtime when installed, otherwise IoU fallback.
  # bytetrack: lightweight ByteTrack-style matching implemented in tracker/bytetrack_tracker.py.
  # iou: force the simple IoU fallback tracker.
  type: deepsort
  use_real_deepsort: true
  iou_threshold: 0.3
  max_missing: 30
  return_missing: false
  high_conf_threshold: 0.5
  low_conf_threshold: 0.1
  low_iou_threshold: 0.2

roi:
  enabled: true
  # Normalized polygon points in clockwise order. Values are multiplied by frame width/height.
  # Default ROI uses the full frame. Override via the web UI ROI drawing when needed.
  normalized: true
  points:
    - [0.0, 0.0]
    - [1.0, 0.0]
    - [1.0, 1.0]
    - [0.0, 1.0]

flow_counter:
  enabled: true
  direction: any
  # Default line uses the top edge of the ROI polygon above.
  line:
    start: [0.0, 0.0]
    end: [1.0, 0.0]
    normalized: true

analytics:
  trajectory_max_length: 30
  use_bottom_center: true
  low_speed_pixel_threshold: 2.0
  # Approximate fallback used only when homography calibration is not provided.
  # For accurate real-world speed, provide calibration/homography instead.
  speed_meters_per_pixel: 0.05
  speed_smoothing_alpha: 0.35
  # Motions below this pixel/frame threshold are treated as bbox jitter, not real speed.
  speed_min_motion_px_per_frame: 2.0
  # Do not include the first few valid samples of a new track in displayed/average speed.
  speed_warmup_frames: 3
  # Use the median of recent valid samples to reduce one-frame detection jitter.
  speed_history_size: 5
  # Suppress sudden one-frame drops below this ratio of the previous stable speed.
  speed_max_drop_ratio: 0.45
  # Keep the previous stable speed for a few jitter-suppressed frames.
  speed_hold_frames: 8
  max_speed_kmh: 160.0
  congestion_rules:
    slow:
      min_roi_vehicle_count: 5
      min_low_speed_ratio: 0.20
      min_occupancy_ratio: 0.25
      min_duration_frames: 1
    congested:
      min_roi_vehicle_count: 8
      min_low_speed_ratio: 0.40
      min_occupancy_ratio: 0.45
      min_duration_frames: 2
    severe:
      min_roi_vehicle_count: 12
      min_low_speed_ratio: 0.65
      min_occupancy_ratio: 0.70
      min_duration_frames: 3

paths:
  classes: configs/classes.yaml
  dataset: data/dataset.yaml
  logs: outputs/logs
  alarms: outputs/alarms
  metrics: outputs/metrics
  snapshots: outputs/snapshots


