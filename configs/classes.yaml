# Class configuration reference for both official YOLOv5 COCO weights and the custom traffic dataset.

official_coco:
  nc: 80
  target_class_ids: [2, 7]
  target_classes: [car, truck]
  vehicle_class_ids: [2, 7]
  vehicle_classes: [car, truck]

custom_traffic:
  nc: 7
  names:
    0: Motor Vehicle
    1: Non_motorized Vehicle
    2: Pedestrian
    3: Traffic Light-Red Light
    4: Traffic Light-Yellow Light
    5: Traffic Light-Green Light
    6: Traffic Light-Off
  vehicle_class_ids: [0]
  non_motor_class_ids: [1]
  pedestrian_class_ids: [2]
  ignored_class_ids: [3, 4, 5, 6]

# Runtime note:
# configs/system.yaml -> model.auto_classes=true keeps COCO car/truck filtering for official weights.
# When custom traffic weights are used, the pipeline keeps only Motor Vehicle for highway traffic-flow analysis.
